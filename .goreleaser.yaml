version: 2

project_name: ginko

before:
  hooks:
    - go mod tidy

builds:
  - id: ginko
    main: ./cmd/ginko
    binary: ginko
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}
  - id: ginko-admin
    main: ./cmd/ginko-admin
    binary: ginko-admin
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}
  - id: memctl
    main: ./cmd/memctl
    binary: memctl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}
  - id: memmcp
    main: ./cmd/memmcp
    binary: memmcp
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}
  - id: memserver
    main: ./cmd/memserver
    binary: memserver
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/salemarsm/ginko/internal/version.Version={{.Version}} -X github.com/salemarsm/ginko/internal/version.Commit={{.Commit}} -X github.com/salemarsm/ginko/internal/version.Date={{.Date}}

archives:
  - id: ginko-bundle
    builds:
      - ginko
      - ginko-admin
      - memctl
      - memmcp
      - memserver
    formats: [tar.gz]
    name_template: "ginko_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - docs/whitepaper/ginko-whitepaper.pdf
      - docs/assets/ginko-brand.jpg

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
