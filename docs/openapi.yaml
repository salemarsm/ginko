openapi: 3.0.3
info:
  title: Ginko API
  version: 1.0.0
  description: Local-first canonical memory API for AI agents. All endpoints are available under both /api and /api/v1; prefer /api/v1 for new integrations.
servers:
  - url: http://127.0.0.1:8787
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
  /api/config:
    get:
      summary: Get effective server configuration
      responses:
        '200':
          description: Effective config
  /api/context:
    post:
      summary: Build compact token-budgeted prompt context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextRequest'
      responses:
        '200':
          description: Prompt-ready context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextResponse'
  /api/feedback:
    post:
      summary: Record feedback for a context response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextFeedback'
      responses:
        '200':
          description: Feedback recorded
  /api/suggest:
    post:
      summary: Suggest durable memories/learnings from prompts and model output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestRequest'
      responses:
        '200':
          description: Memory candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestResponse'
  /api/usage:
    get:
      summary: List memories with retrieval usage counters
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: subject
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: scope
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
        - name: event_limit
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Memories with usage counters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemoryUsageRow'
  /api/search:
    post:
      summary: Search raw memories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Query'
      responses:
        '200':
          description: Matching memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memory'
  /api/memories:
    get:
      summary: Search memories with query parameters
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: subject
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: scope
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Matching memories
    post:
      summary: Create or update a memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Memory'
      responses:
        '200':
          description: Stored memory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
  /api/memories/{id}:
    get:
      summary: Get memory by ID
      parameters:
        - $ref: '#/components/parameters/MemoryID'
      responses:
        '200':
          description: Memory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
        '404':
          description: Not found
    delete:
      summary: Forget/delete memory
      parameters:
        - $ref: '#/components/parameters/MemoryID'
      responses:
        '200':
          description: Deleted
  /api/supersede/{id}:
    post:
      summary: Supersede an old memory with a newer one
      parameters:
        - $ref: '#/components/parameters/MemoryID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Memory'
      responses:
        '200':
          description: New memory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
  /api/events:
    get:
      summary: List recent audit events
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
  /api/documents/{id}/suggest:
    post:
      summary: Suggest memory candidates from document chunks
      parameters:
        - $ref: '#/components/parameters/MemoryID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChunkSuggestRequest'
      responses:
        '200':
          description: Memory candidates with chunk provenance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkSuggestResponse'
  /api/chunks/search:
    post:
      summary: Search RAG chunks/evidence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChunkSearchRequest'
      responses:
        '200':
          description: Matching chunks with document provenance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChunkSearchResult'
  /api/ingest:
    post:
      summary: Ingest a file or directory into RAG documents/chunks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '200':
          description: Ingestion run result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
  /api/ingestion-runs:
    get:
      summary: List RAG ingestion runs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        '200':
          description: Ingestion runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IngestionRun'
  /api/documents:
    get:
      summary: List ingested RAG documents
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 200 }
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
  /api/documents/{id}/extract:
    post:
      summary: Extract memory candidates from document chunks using LLM (falls back to heuristic)
      parameters:
        - $ref: '#/components/parameters/MemoryID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChunkSuggestRequest'
      responses:
        '200':
          description: Memory candidates extracted by LLM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkSuggestResponse'
  /api/ingest/status:
    get:
      summary: Check re-ingest status for a path (unchanged/changed/new)
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Ingest status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [unchanged, changed, new] }
                  path: { type: string }
                  sha256: { type: string }
  /api/memories/{id}/timeline:
    get:
      summary: Lifecycle/audit trail for a memory (supersessions, deletes, approvals)
      parameters:
        - $ref: '#/components/parameters/MemoryID'
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Ordered events for this memory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '404':
          description: Not found
  /api/memories/{id}/approve:
    post:
      summary: Approve a pending memory (sets status=active)
      parameters:
        - $ref: '#/components/parameters/MemoryID'
      responses:
        '200':
          description: Approved memory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
  /api/sessions/start:
    post:
      summary: Start a project session; returns last closed session summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project: { type: string }
      responses:
        '200':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStartResponse'
  /api/sessions/end:
    post:
      summary: End session with a summary for future continuity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project, summary]
              properties:
                project: { type: string }
                summary: { type: string }
      responses:
        '200':
          description: Session closed
  /api/sessions/summary:
    post:
      summary: Retrieve the most recent closed session summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project: { type: string }
      responses:
        '200':
          description: Last session summary
  /api/signals:
    get:
      summary: List coordination signals
      parameters:
        - name: project
          in: query
          schema: { type: string }
        - name: kind
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, default: active }
        - name: agent
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        '200':
          description: Signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentSignal'
    post:
      summary: Create a coordination signal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentSignal'
      responses:
        '200':
          description: Created signal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSignal'
  /api/signals/expire:
    post:
      summary: Sweep and expire all stale leases whose expires_at is in the past
      responses:
        '200':
          description: Number of signals expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  expired: { type: integer }
  /api/signals/{id}:
    get:
      summary: Get a signal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Signal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSignal'
        '404':
          description: Not found
  /api/signals/{id}/acknowledge:
    post:
      summary: Acknowledge a signal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated signal
  /api/signals/{id}/resolve:
    post:
      summary: Resolve a signal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated signal
  /api/signals/{id}/cancel:
    post:
      summary: Cancel a signal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated signal
  /api/analytics/supersessions:
    get:
      summary: Supersession timeline for audit/analytics view
      responses:
        '200':
          description: Supersession timeline
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: Required for `/api` and `/api/v1` endpoints when `server.auth_token` or `server.auth_token_env` is configured; non-loopback binds require a token.
  parameters:
    MemoryID:
      name: id
      in: path
      required: true
      schema: { type: string }
  schemas:
    ChunkSuggestRequest:
      type: object
      properties:
        subject: { type: string }
        scope: { type: string }
        limit: { type: integer, default: 10 }
        min_confidence: { type: number, default: 0.65 }
        store: { type: boolean, default: false }
    ChunkSuggestResponse:
      type: object
      properties:
        document:
          $ref: '#/components/schemas/Document'
        candidates:
          type: array
          items:
            type: object
            properties:
              memory:
                $ref: '#/components/schemas/Memory'
              reason: { type: string }
              requires_confirmation: { type: boolean }
        stored:
          type: array
          items:
            $ref: '#/components/schemas/Memory'
    ChunkSearchRequest:
      type: object
      properties:
        text: { type: string }
        document_id: { type: string }
        limit: { type: integer, default: 20 }
    ChunkSearchResult:
      type: object
      properties:
        chunk:
          $ref: '#/components/schemas/Chunk'
        document:
          $ref: '#/components/schemas/Document'
        score: { type: number }
    IngestRequest:
      type: object
      required: [path]
      properties:
        path: { type: string }
        recursive: { type: boolean, default: false }
    IngestionRun:
      type: object
      properties:
        id: { type: string }
        source_path: { type: string }
        recursive: { type: boolean }
        parser: { type: string }
        status: { type: string }
        files_seen: { type: integer }
        documents_created: { type: integer }
        chunks_created: { type: integer }
        error: { type: string }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
    IngestResponse:
      type: object
      properties:
        run:
          $ref: '#/components/schemas/IngestionRun'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/Chunk'
        skipped:
          type: array
          items: { type: string }
    Document:
      type: object
      properties:
        id: { type: string }
        ingestion_run_id: { type: string }
        path: { type: string }
        title: { type: string }
        source_kind: { type: string }
        source_ref: { type: string }
        sha256: { type: string }
        created_at: { type: string, format: date-time }
    Chunk:
      type: object
      properties:
        id: { type: string }
        document_id: { type: string }
        ordinal: { type: integer }
        heading_path: { type: string }
        content: { type: string }
        token_count: { type: integer }
        page_from: { type: integer, nullable: true }
        page_to: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
    Source:
      type: object
      required: [kind, ref]
      properties:
        kind: { type: string, example: conversation }
        ref: { type: string, example: session/message }
    Memory:
      type: object
      required: [type, subject, content, source, scope, confidence]
      properties:
        id: { type: string, example: mem_01J }
        type:
          type: string
          enum: [preference, fact, decision, task, note, relationship]
        subject: { type: string, example: botmaster }
        content: { type: string, example: User prefers direct technical answers. }
        source:
          $ref: '#/components/schemas/Source'
        scope:
          type: string
          enum: [global, project, session, private]
        confidence: { type: number, minimum: 0, maximum: 1, example: 0.95 }
        status:
          type: string
          enum: [active, pending, deleted]
          default: active
        topic_key: { type: string, nullable: true, description: "Auto-supersedes previous memory with same (subject, topic_key) on write" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        valid_from: { type: string, format: date-time, nullable: true }
        valid_until: { type: string, format: date-time, nullable: true }
        supersedes_id: { type: string, nullable: true }
        superseded_by: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        embedding_refs:
          type: object
          additionalProperties: { type: string }
    Query:
      type: object
      properties:
        text: { type: string }
        types:
          type: array
          items: { type: string }
        scopes:
          type: array
          items: { type: string }
        subject: { type: string }
        tags:
          type: array
          items: { type: string }
        limit: { type: integer, default: 20 }
    ContextRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        subject: { type: string }
        scopes:
          type: array
          items: { type: string }
        types:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        max_tokens: { type: integer, default: 1200 }
        max_memories: { type: integer, default: 12 }
    ContextResponse:
      type: object
      properties:
        context_id: { type: string }
        context: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/Memory'
        rankings:
          type: object
          description: Ranking metadata keyed by memory ID
          additionalProperties:
            $ref: '#/components/schemas/RankingMetadata'
        conflicts:
          type: array
          description: Structural conflicts detected in context window (same subject+type)
          items:
            $ref: '#/components/schemas/ContextConflict'
        estimated_tokens: { type: integer }
        budget_tokens: { type: integer }
        truncated: { type: boolean }
    RankingMetadata:
      type: object
      properties:
        lexical_score: { type: number, nullable: true }
        semantic_score: { type: number, nullable: true }
        recency_score: { type: number }
        confidence_score: { type: number }
        provenance_score: { type: number }
        final_score: { type: number }
        rank_reason: { type: string }
    ContextConflict:
      type: object
      properties:
        subject: { type: string }
        type: { type: string }
        ids:
          type: array
          items: { type: string }
    AgentSignal:
      type: object
      required: [project, kind, owner_agent, payload]
      properties:
        id: { type: string, example: sig_01J }
        project: { type: string }
        topic_key: { type: string, nullable: true }
        kind:
          type: string
          enum: [notice, lease, handoff, conflict, review_request, blocker]
        status:
          type: string
          enum: [active, acknowledged, expired, resolved, cancelled]
          default: active
        owner_agent: { type: string, example: claude-code }
        target_agent: { type: string, nullable: true }
        payload: { type: string }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true, description: "Required for lease signals" }
        resolved_at: { type: string, format: date-time, nullable: true }
        memory_id: { type: string, nullable: true }
        session_id: { type: string, nullable: true }
    SessionStartResponse:
      type: object
      properties:
        session_id: { type: string }
        project: { type: string }
        started_at: { type: string, format: date-time }
        last_summary: { type: string, nullable: true }
    MemoryUsage:
      type: object
      properties:
        memory_id: { type: string }
        context_uses: { type: integer }
        useful_votes: { type: integer }
        useless_votes: { type: integer }
        last_used_at: { type: string, format: date-time, nullable: true }
    MemoryUsageRow:
      type: object
      properties:
        usage:
          $ref: '#/components/schemas/MemoryUsage'
        memory:
          $ref: '#/components/schemas/Memory'
    ContextFeedback:
      type: object
      required: [context_id, useful]
      properties:
        context_id: { type: string }
        useful: { type: boolean }
        memory_ids_used:
          type: array
          items: { type: string }
        source:
          $ref: '#/components/schemas/Source'
    SuggestRequest:
      type: object
      properties:
        subject: { type: string }
        scope: { type: string }
        user_prompt: { type: string }
        assistant_response: { type: string }
        llm_inference: { type: string }
        max_candidates: { type: integer }
        min_confidence: { type: number }
    SuggestResponse:
      type: object
      properties:
        candidates:
          type: array
          items:
            type: object
            properties:
              memory:
                $ref: '#/components/schemas/Memory'
              reason: { type: string }
              requires_confirmation: { type: boolean }
    Event:
      type: object
      properties:
        id: { type: string }
        kind: { type: string }
        payload: { type: string }
        source:
          $ref: '#/components/schemas/Source'
        created_at: { type: string, format: date-time }
